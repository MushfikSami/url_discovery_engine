# ==========================================
# URL Discovery Engine - Configuration
# ==========================================
# This file contains all configurable parameters
# Use for controlling application behavior

# ------------------------------------------
# Application Settings
# ------------------------------------------
app:
  name: "url_discovery_engine"
  version: "1.0.0"
  debug: false

# ------------------------------------------
# Database Configuration
# ------------------------------------------
database:
  host: "${DB_HOST}"
  port: "${DB_PORT}"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"

  # Database names
  bd_gov_db: "${BD_GOV_DB_NAME}"
  gov_bd_db: "${GOV_BD_DB_NAME}"
  banglapedia_db: "${BANGLAPEDIA_DB_NAME}"

# ------------------------------------------
# LLM Configuration (vLLM)
# ------------------------------------------
llm:
  base_url: "${VLLM_BASE_URL}"
  api_key: "${VLLM_API_KEY}"
  model_name: "${LLM_MODEL_NAME}"

# ------------------------------------------
# Triton Inference Server (Embeddings)
# ------------------------------------------
triton:
  url: "${TRITON_URL}"

# ------------------------------------------
# Elasticsearch Configuration
# ------------------------------------------
elasticsearch:
  host: "${ES_HOST}"
  index_name: "${ES_INDEX_NAME}"

# ------------------------------------------
# Gradio UI Configuration
# ------------------------------------------
gradio:
  server_name: "${GRADIO_SERVER_NAME}"
  server_port: "${GRADIO_SERVER_PORT}"

# ------------------------------------------
# Crawler Settings
# ------------------------------------------
crawler:
  # Concurrency settings
  max_concurrent_requests: 30
  liveness_max_concurrent: 100

  # Timeout settings (seconds)
  timeout: 15
  liveness_timeout: 7

  # Politeness delay (seconds)
  politeness_delay: 0.5

  # User-Agent header
  user_agent: "${CRAWLER_USER_AGENT}"

  # Content extraction settings
  word_count_threshold: 20

  # Excluded HTML tags during crawling
  excluded_tags:
    - nav
    - footer
    - header
    - aside
    - form
    - script
    - style
    - noscript

# ------------------------------------------
# Banglapedia Crawler Settings
# ------------------------------------------
banglapedia:
  # Language: "bn" for Bengali, "en" for English
  language: "bn"

  # CSS selector for content extraction
  css_selector: "#mw-content-text"

  # Word count threshold
  word_count_threshold: 15

  # API pagination limit
  api_limit: 500

# ------------------------------------------
# Gov BD Crawler Settings (Without LLM)
# ------------------------------------------
gov_crawler:
  # Text cleaning settings
  bloat_keywords:
    - "অফিসের ধরণ নির্বাচন করুন"
    - "এক্সেসিবিলিটি মেনুতে যান"
    - "বাংলাদেশ জাতীয় তথ্য বাতায়ন"
    - "অফিস স্তর নির্বাচন করুন"
    - "বিভাগ নির্বাচন করুন"
    - "জেলা নির্বাচন করুন"
    - "উপজেলা নির্বাচন করুন"
    - "হটলাইন"
    - "মেনু নির্বাচন করুন"
    - "জরুরি সেবা নম্বরসমূহ"
    - "ফন্ট বৃদ্ধি ফন্ট হ্রাস"
    - "স্ক্রিন রিডার ডাউনলোড করুন"
    - "© 2026 সর্বস্বত্ব সংরক্ষিত"
    - "পরিকল্পনা এবং বাস্তবায়ন"

# ------------------------------------------
# Agent Settings (Tree Index)
# ------------------------------------------
agent:
  # Maximum reasoning hops
  max_hops: 5

  # Safety breaker (maximum iterations)
  safety_breaker: 15

  # Search settings
  tree_search_top_n: 5
  chunk_size: 2000
  chunk_overlap: 300

  # ReAct settings
  escape_hatch_threshold: 3

# ------------------------------------------
# Elasticsearch Engine Settings
# ------------------------------------------
es_engine:
  # Search settings
  top_k: 4
  num_candidates: 50

  # Vector search boost
  vector_boost: 0.5

  # Field boosting for multi_match
  field_boosts:
    summary: 2.0
    keywords: 1.5
    raw_markdown: 1.0

  # Chunking settings
  chunk_size: 1500
  chunk_overlap: 200
  batch_size: 250

# ------------------------------------------
# Evaluation Settings (DeepEval)
# ------------------------------------------
evaluation:
  # Metrics threshold
  threshold: 0.7

  # Test queries
  queries_file: "DeepEval/queries.csv"
  output_file: "DeepEval/evaluated_queries.csv"

# ------------------------------------------
# Logging Settings
# ------------------------------------------
logging:
  level: "${LOG_LEVEL}"
  file: "${LOG_FILE}"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
